<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>登录 - MAY 平台</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="login-body">

    <div class="login-container">
        <div class="login-box">
            <div class="login-header">
                <h1>MAY <span class="accent">LOGIN</span></h1>
                <p>请输入你的管理员凭证</p>
            </div>

            <!-- 显示错误/成功信息 -->
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    <ul class="flashes">
                    {% for category, message in messages %}
                        <li class="{{ category }}">{{ message }}</li>
                    {% endfor %}
                    </ul>
                {% endif %}
            {% endwith %}

            <form method="POST" action="/login">
                <div class="input-group">
                    <label>用户名</label>
                    <input type="text" name="username" placeholder="例如: admin" required autocomplete="off">
                </div>
                <div class="input-group">
                    <label>密码</label>
                    <input type="password" name="password" placeholder="••••••" required>
                </div>
                <button type="submit" class="btn-submit">接入系统</button>
            </form>
            
            <div class="login-footer">
                <a href="/">← 返回首页</a>
            </div>
        </div>
    </div>

</body>
</html>
