<!DOCTYPE html>
<!-- ============================================================
     login.html — HiveMC 登录页面
     功能：用户名密码登录表单，登录成功跳转到用户后台
     ============================================================ -->
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - HiveMC</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="login-body">

    <!-- ======== 登录表单容器 ======== -->
    <div class="login-container">
        <div class="login-box">
            <!-- 标题区域 -->
            <div class="login-header">
                <h1>HiveMC</h1>
                <p>登录到管理面板</p>
            </div>

            <!-- Flash 消息通知（自动消失的 Toast） -->
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                    <div class="toast toast-{{ category }}" id="toast-{{ loop.index }}">{{ message }}</div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <!-- 登录表单 -->
            <form method="POST" action="/login">
                <div class="input-group">
                    <label>用户名</label>
                    <input type="text" name="username" placeholder="请输入用户名" required autocomplete="off">
                </div>
                <div class="input-group">
                    <label>密码</label>
                    <input type="password" name="password" placeholder="请输入密码" required>
                </div>
                <button type="submit" class="btn-submit">登录</button>
            </form>
            
            <!-- 底部导航链接 -->
            <div class="login-footer">
                <a href="/">返回首页</a>
                <span style="margin: 0 8px; color: #ddd;">·</span>
                <a href="/register">注册账户</a>
            </div>
        </div>
    </div>

<script>
    /**
     * Toast 通知自动消失逻辑
     * - 3 秒后自动淡出并移除
     * - 点击可提前关闭
     */
    document.addEventListener('DOMContentLoaded', function() {
        var toasts = document.querySelectorAll('.toast');
        toasts.forEach(function(toast) {
            setTimeout(function() {
                toast.style.transition = 'opacity 0.5s ease';
                toast.style.opacity = '0';
                setTimeout(function() { toast.remove(); }, 500);
            }, 3000);
            toast.addEventListener('click', function() {
                toast.style.transition = 'opacity 0.3s ease';
                toast.style.opacity = '0';
                setTimeout(function() { toast.remove(); }, 300);
            });
        });
    });
</script>

</body>
</html>
