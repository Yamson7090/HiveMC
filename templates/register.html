<!DOCTYPE html>
<!-- ============================================================
     register.html — MCMAY Panel 注册页（Miro 风格）
     功能：新用户注册表单，含输入合法性校验
     ============================================================ -->
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 — MCMAY Panel</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="login-body">

    <!-- ======== 注册表单容器（Miro: 居中白色卡片） ======== -->
    <div class="login-container">
        <div class="login-box">
            <!-- 标题区域 -->
            <div class="login-header">
                <div class="logo">MCMAY</div>
                <p>创建新账户</p>
            </div>

            <!-- Flash 消息通知 -->
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                    <div class="toast toast-{{ category }}" id="toast-r-{{ loop.index }}">{{ message }}</div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <!-- 注册表单 -->
            <form method="POST" action="/register">
                <div class="input-group">
                    <label>用户名</label>
                    <input type="text" name="username" placeholder="请输入用户名" required autocomplete="off">
                </div>
                <div class="input-group">
                    <label>密码</label>
                    <input type="password" name="password" placeholder="至少 6 位" required>
                </div>
                <div class="input-group">
                    <label>确认密码</label>
                    <input type="password" name="confirm_password" placeholder="再次输入密码" required>
                </div>
                <button type="submit" class="btn-submit">注册</button>
            </form>

            <!-- 底部导航链接 -->
            <div class="login-footer">
                <a href="/login">已有账户？去登录</a>
            </div>
        </div>
    </div>

<script>
    /**
     * Toast 通知自动消失逻辑
     */
    document.addEventListener('DOMContentLoaded', function() {
        var toasts = document.querySelectorAll('.toast');
        toasts.forEach(function(toast) {
            setTimeout(function() {
                toast.style.transition = 'opacity 0.5s ease';
                toast.style.opacity = '0';
                setTimeout(function() { toast.remove(); }, 500);
            }, 3000);
            toast.addEventListener('click', function() {
                toast.style.transition = 'opacity 0.3s ease';
                toast.style.opacity = '0';
                setTimeout(function() { toast.remove(); }, 300);
            });
        });
    });
</script>

</body>
</html>
