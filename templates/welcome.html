<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>欢迎来到 MAY</title>
    <!-- 引用静态 CSS 文件 -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

        <main>

                <div class="feature-item">
                    <h3>🎨 精美设计</h3>

                <!-- 登录按钮链接到 /login 路由 -->
